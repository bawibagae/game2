<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지옥의 피하기: 모바일 탄막 버전</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; color: #ff0055; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; background: rgba(0,0,0,0.9);
        }

        #leaderboard {
            width: 80%; max-width: 320px; margin-bottom: 20px; padding: 15px;
            border: 2px solid #ff0055; border-radius: 10px; background: rgba(255,0,85,0.05);
        }
        .rank-item { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; border-bottom: 1px dotted #444; }

        input {
            padding: 12px; font-size: 16px; margin-bottom: 15px; width: 60%; max-width: 250px;
            background: #111; color: #00ffcc; border: 1px solid #00ffcc; text-align: center; outline: none;
        }

        #start-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: transparent; color: #ff0055; border: 3px solid #ff0055;
            cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px #ff0055;
        }

        #pause-msg {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #00ffcc;
            font-size: 40px; font-weight: bold; text-align: center;
            z-index: 15; text-shadow: 0 0 20px #00ffcc; pointer-events: none;
        }

        #score-board { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; font-size: 24px; font-weight: bold; z-index: 10; color: #00ffcc; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <h1 style="font-size: 32px; margin-bottom: 10px;">BULLET HELL</h1>
        <div id="leaderboard">
            <h2 style="text-align: center; margin-top: 0; font-size: 20px;">TOP 5 RANKS</h2>
            <div id="rank-list"></div>
        </div>
        <input type="text" id="nickname" placeholder="NAME" maxlength="10">
        <button id="start-btn">START</button>
        <p style="color: #666; font-size: 11px; margin-top: 15px;">PC: ESC to Pause / Mobile: Tap to Resume</p>
    </div>

    <div id="pause-msg">PAUSED<br><span style="font-size: 16px;">TAP/CLICK TO RESUME</span></div>
    <div id="score-board">SCORE: 0</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const startBtn = document.getElementById('start-btn');
        const nickInput = document.getElementById('nickname');
        const rankList = document.getElementById('rank-list');
        const scoreBoard = document.getElementById('score-board');
        const pauseMsg = document.getElementById('pause-msg');

        let score = 0, obstacles = [], isGameRunning = false, isPaused = false;
        let mouseX = 0, mouseY = 0;
        let currentSpeed = 5, spawnInterval = 350, spawnTimer = null, animationId = null;

        // 기기 체크 (모바일 여부)
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function saveScore(name, val) {
            let scores = JSON.parse(localStorage.getItem('he_ranks')) || [];
            scores.push({ name: name || 'ANON', score: val });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('he_ranks', JSON.stringify(scores.slice(0, 5)));
        }

        function displayRanks() {
            const scores = JSON.parse(localStorage.getItem('he_ranks')) || [];
            rankList.innerHTML = scores.map((s, i) => 
                `<div class="rank-item"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`
            ).join('') || '<div style="text-align:center">NO RECORDS</div>';
        }
        displayRanks();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(!isGameRunning) {
                mouseX = canvas.width / 2;
                mouseY = canvas.height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 컨트롤 로직 (PC & 모바일 통합) ---
        
        // PC 마우스 이동
        window.addEventListener('mousemove', (e) => {
            if (!isGameRunning || isPaused) return;
            if (document.pointerLockElement === canvas) {
                mouseX += e.movementX;
                mouseY += e.movementY;
            } else if (!isMobile) {
                // 포인터락이 아닐 때의 예외 처리
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            limitMouse();
        });

        // 모바일 터치 이동
        canvas.addEventListener('touchmove', (e) => {
            if (!isGameRunning || isPaused) return;
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            limitMouse();
        }, { passive: false });

        function limitMouse() {
            mouseX = Math.max(0, Math.min(canvas.width, mouseX));
            mouseY = Math.max(0, Math.min(canvas.height, mouseY));
        }

        // 일시정지 해제 클릭
        canvas.addEventListener('mousedown', () => {
            if (isGameRunning && isPaused) resumeGame();
            else if (isGameRunning && !isMobile && document.pointerLockElement !== canvas) {
                canvas.requestPointerLock();
            }
        });
        canvas.addEventListener('touchstart', (e) => {
            if (isGameRunning && isPaused) resumeGame();
        });

        document.addEventListener('pointerlockchange', () => {
            if (!isMobile && document.pointerLockElement !== canvas && isGameRunning) {
                pauseGame();
            }
        });

        function pauseGame() { isPaused = true; pauseMsg.style.display = 'block'; }
        function resumeGame() { 
            isPaused = false; 
            pauseMsg.style.display = 'none'; 
            if(!isMobile) canvas.requestPointerLock();
        }

        // --- 게임 핵심 로직 ---

        function createObstacle() {
            let sides = [0]; 
            if (score >= 50)  sides.push(1);
            if (score >= 100) sides.push(2);
            if (score >= 150) sides.push(3);
            if (score >= 200) sides.push(4);
            if (score >= 250) sides.push(5);
            if (score >= 300) sides.push(6);
            if (score >= 350) sides.push(7);

            const side = sides[Math.floor(Math.random() * sides.length)];
            let x, y, vx, vy;
            const s = currentSpeed + Math.random() * 2.5;
            const size = 12 + Math.random() * 15;

            switch(side) {
                case 0: x = Math.random()*canvas.width; y = -30; vx = (Math.random()-0.5)*3; vy = s; break;
                case 1: x = -30; y = Math.random()*canvas.height; vx = s; vy = (Math.random()-0.5)*3; break;
                case 2: x = canvas.width+30; y = Math.random()*canvas.height; vx = -s; vy = (Math.random()-0.5)*3; break;
                case 3: x = Math.random()*canvas.width; y = canvas.height+30; vx = (Math.random()-0.5)*3; vy = -s; break;
                case 4: x = -30; y = -30; vx = s; vy = s; break;
                case 5: x = canvas.width+30; y = -30; vx = -s; vy = s; break;
                case 6: x = -30; y = canvas.height+30; vx = s; vy = -s; break;
                case 7: x = canvas.width+30; y = canvas.height+30; vx = -s; vy = -s; break;
            }
            return { x, y, vx, vy, size, color: `hsl(${Math.random() * 360}, 80%, 60%)` };
        }

        startBtn.onclick = (e) => {
            e.stopPropagation();
            isGameRunning = true; isPaused = false; score = 0; obstacles = []; currentSpeed = 5; spawnInterval = 350;
            uiLayer.style.display = 'none'; scoreBoard.innerText = "SCORE: 0";
            if(!isMobile) canvas.requestPointerLock();
            startTimer(); draw();
        };

        function startTimer() {
            if(spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                if(isGameRunning && !isPaused) {
                    const count = 2 + Math.floor(score / 70); 
                    for(let i=0; i<count; i++) obstacles.push(createObstacle());
                }
            }, spawnInterval);
        }

        function gameOver() {
            isGameRunning = false; clearInterval(spawnTimer); 
            if(!isMobile) document.exitPointerLock();
            saveScore(nickInput.value, score); displayRanks();
            uiLayer.style.display = 'flex';
            alert(`GAME OVER\nSCORE: ${score}`);
        }

        function draw() {
            if (!isGameRunning) return;
            if (!isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < obstacles.length; i++) {
                    let o = obstacles[i];
                    o.x += o.vx; o.y += o.vy;
                    ctx.fillStyle = o.color;
                    ctx.beginPath(); ctx.arc(o.x, o.y, o.size/2, 0, Math.PI*2); ctx.fill();

                    if (Math.hypot(mouseX - o.x, mouseY - o.y) < o.size/2 + 4) { gameOver(); return; }

                    if (o.x < -150 || o.x > canvas.width+150 || o.y < -150 || o.y > canvas.height+150) {
                        obstacles.splice(i, 1); i--; score++;
                        scoreBoard.innerText = "SCORE: " + score;
                        if (score % 40 === 0) { 
                            currentSpeed += 0.45; 
                            spawnInterval = Math.max(80, spawnInterval - 25); 
                            startTimer(); 
                        }
                    }
                }
                // 플레이어 포인터
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2); ctx.stroke();
            }
            animationId = requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
